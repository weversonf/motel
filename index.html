<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva Dreams v05.1</title>
    <style>
        :root {
            --primary: #00ff00; 
            --bg: #000000;      
            --text-user: #00ff00;
            --bot-bg: rgba(0, 255, 0, 0.1); 
            --bot-text: #c0ffc0;
            --header-bg: #0a0a0a;
            --panel-bg: #111111;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; padding: 10px; color: #fff; }

        .chat-container {
            width: 100%; max-width: 450px; background: #050505; border-radius: 12px;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2); display: flex; flex-direction: column;
            height: 90vh; max-height: 750px; overflow: hidden; border: 1px solid rgba(0, 255, 0, 0.1);
        }

        .chat-header {
            background: var(--header-bg); color: var(--primary); padding: 15px; text-align: center;
            font-weight: bold; font-size: 1.1rem; letter-spacing: 2px; text-transform: uppercase;
            border-bottom: 1px solid rgba(0, 255, 0, 0.2); display: flex; height: 60px; justify-content: center; align-items: center; gap: 8px;
        }

        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; background: #000; }

        .msg { padding: 12px 16px; border-radius: 15px; max-width: 85%; line-height: 1.4; font-size: 0.95rem; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg.bot { background: var(--bot-bg); color: var(--bot-text); align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid rgba(0,255,0,0.1); }
        .msg.user { background: #111; color: var(--text-user); align-self: flex-end; border-bottom-right-radius: 2px; border: 1px solid var(--primary); }

        .ui-box { margin-top: 5px; display: flex; flex-direction: column; gap: 10px; width: 100%; }
        .ui-box input { padding: 12px; border: 1px solid #333; border-radius: 8px; font-size: 1rem; width: 100%; outline: none; background: #111; color: #fff; }
        .ui-box input:focus { border-color: var(--primary); }
        
        .btn-action { padding: 12px; background: var(--primary); color: #000; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; }
        .btn-action:hover { box-shadow: 0 0 10px var(--primary); }
        
        .btn-outline { padding: 12px; background: #000; color: var(--primary); border: 2px solid var(--primary); border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; text-align: left; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        
        .card-motel { background: #111; border: 1px solid #333; border-radius: 8px; overflow: hidden; cursor: pointer; transition: 0.2s; margin-bottom: 5px; }
        .card-motel:hover { border-color: var(--primary); }
        .card-motel img { width: 100%; height: 120px; object-fit: cover; }
        .card-motel div { padding: 12px; text-align: center; font-weight: bold; color: var(--primary); }

        .termos-box { background: #111; border: 2px solid var(--primary); padding: 15px; border-radius: 8px; color: var(--bot-text); }

        .input-area { display: flex; padding: 15px; border-top: 1px solid rgba(0,255,0,0.1); gap: 10px; background: #0a0a0a; }
        .input-area input { flex: 1; padding: 12px; border: 1px solid #333; border-radius: 20px; outline: none; background: #1a1a1a; color: #fff; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header"><span>♾️</span> DREAMS MOTEL</div>
        <div class="chat-box" id="chat"></div>
        <div class="input-area" id="inputArea">
            <input type="text" id="userInput" placeholder="Digite seu nome..." onkeypress="handleEnter(event, 'nome')">
            <button onclick="handleText()">Enviar</button>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const inputArea = document.getElementById('inputArea');
        const userInput = document.getElementById('userInput');

        let step = 0;
        let userData = { nome: '', dataNasc: '', cpf: '', suite: '', precoBase: 0, promocao: '', dataRes: '', horaRes: '', total: 0 };

        const suites = [
            { nome: "Suíte Standard", preco: 100, img: "https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?w=400&h=200&fit=crop" },
            { nome: "Suíte Master", preco: 180, img: "https://images.unsplash.com/photo-1542314831-c6a4d27ece08?w=400&h=200&fit=crop" },
            { nome: "Suíte Dreams (Hidro)", preco: 250, img: "https://images.unsplash.com/photo-1566665797739-1674de7a421a?w=400&h=200&fit=crop" }
        ];

        function addMsg(text, sender) {
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            div.innerHTML = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function handleEnter(event, type) {
            if (event.key === 'Enter') {
                if (type === 'nome') handleText();
                else processarUI(type);
            }
        }

        function toggleUI(show) { inputArea.style.display = show ? 'flex' : 'none'; }
        function removerUIAnterior() { const uis = document.querySelectorAll('.ui-box'); uis.forEach(u => u.style.display = 'none'); }

        function renderUI(type) {
            toggleUI(false);
            const div = document.createElement('div');
            div.className = 'ui-box msg bot';

            if (type === 'dataNasc') {
                div.innerHTML = `<label>Selecione sua data de nascimento:</label>
                <input type="date" id="uiData" onkeypress="handleEnter(event, 'dataNasc')">
                <button class="btn-action" onclick="processarUI('dataNasc')">Confirmar</button>`;
            } 
            else if (type === 'cpf') {
                div.innerHTML = `<label>CPF para reserva:</label>
                <input type="text" id="uiCpf" placeholder="000.000.000-00" maxlength="14" oninput="mascaraCPF(this)" onkeypress="handleEnter(event, 'cpf')">
                <button class="btn-action" onclick="processarUI('cpf')">Confirmar CPF</button>`;
            }
            else if (type === 'suite') {
                div.style.background = 'transparent'; div.style.border = 'none';
                suites.forEach(s => {
                    div.innerHTML += `<div class="card-motel" onclick="processarUI('suite', '${s.nome}', ${s.preco})"><img src="${s.img}"><div>${s.nome}</div></div>`;
                });
            } 
            else if (type === 'dataRes') {
                const hoje = new Date().toISOString().split('T')[0];
                div.innerHTML = `<label>Data da reserva:</label>
                <input type="date" id="uiDataRes" min="${hoje}" onkeypress="handleEnter(event, 'dataRes')">
                <button class="btn-action" onclick="processarUI('dataRes')">Confirmar Data</button>`;
            } 
            else if (type === 'horaRes') {
                div.innerHTML = `<label>Horário de chegada:</label>
                <input type="time" id="uiHoraRes" onkeypress="handleEnter(event, 'horaRes')">
                <button class="btn-action" onclick="processarUI('horaRes')">Confirmar Horário</button>`;
            }
            else if (type === 'finalizar') {
                div.innerHTML = `<button class="btn-action" onclick="finalizarFluxo()">Confirmar Pré-Reserva na Recepção</button>`;
            }

            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            // Foco automático no input se houver
            const input = div.querySelector('input');
            if(input) input.focus();
        }

        function handleText() { 
            const text = userInput.value.trim(); 
            if (!text) return; 
            addMsg(text, 'user'); 
            userInput.value = ''; 
            if (step === 0) { userData.nome = text; step++; setTimeout(nextStep, 500); } 
        }

        function mascaraCPF(i){
            i.value = i.value.replace(/\D/g,"");
            i.value = i.value.replace(/(\d{3})(\d)/,"$1.$2");
            i.value = i.value.replace(/(\d{3})(\d)/,"$1.$2");
            i.value = i.value.replace(/(\d{3})(\d{1,2})$/,"$1-$2");
        }

        function processarUI(tipo, valor = null, precoBase = null) {
            if (tipo === 'dataNasc') { 
                const data = document.getElementById('uiData').value; 
                if(!data) return;
                addMsg(data.split('-').reverse().join('/'), 'user');
                userData.dataNasc = data; step++; 
            } 
            else if (tipo === 'cpf') { 
                const cpf = document.getElementById('uiCpf').value; 
                if(cpf.length < 14) return;
                addMsg(cpf, 'user');
                userData.cpf = cpf; step++; 
            }
            else if (tipo === 'suite') { addMsg(valor, 'user'); userData.suite = valor; userData.precoBase = precoBase; step++; } 
            else if (tipo === 'dataRes') { 
                const data = document.getElementById('uiDataRes').value; 
                if(!data) return;
                addMsg(data.split('-').reverse().join('/'), 'user');
                userData.dataRes = data; step++; 
            } 
            else if (tipo === 'horaRes') { 
                const hora = document.getElementById('uiHoraRes').value; 
                if(!hora) return;
                addMsg(hora, 'user');
                userData.horaRes = hora; step++; 
            }
            removerUIAnterior(); setTimeout(nextStep, 500);
        }

        function nextStep() {
            switch(step) {
                case 0: addMsg("Olá! Bem-vindo ao <b>Motel Dreams</b>. Como você se chama?", 'bot'); toggleUI(true); userInput.focus(); break;
                case 1: addMsg(`Prazer, ${userData.nome}. Selecione sua data de nascimento:`, 'bot'); renderUI('dataNasc'); break;
                case 2: addMsg("Informe seu CPF para o sistema:", 'bot'); renderUI('cpf'); break;
                case 3: addMsg("Qual suíte deseja?", 'bot'); renderUI('suite'); break;
                case 4: addMsg("Para qual data deseja agendar?", 'bot'); renderUI('dataRes'); break;
                case 5: addMsg("Qual o horário previsto de chegada?", 'bot'); renderUI('horaRes'); break;
                case 6: 
                    addMsg(`<b>Resumo da Reserva:</b><br>Suíte: ${userData.suite}<br>Data: ${userData.dataRes.split('-').reverse().join('/')}<br>Hora: ${userData.horaRes}`, 'bot');
                    renderUI('finalizar');
                    break;
            }
        }

        function finalizarFluxo() {
            removerUIAnterior();
            addMsg("✅ <b>Pré-Reserva Confirmada!</b><br>Apresente seu CPF na recepção ao chegar no Dreams.", 'bot');
            console.log("Dados salvos:", userData);
        }

        window.onload = nextStep;
    </script>
</body>
</html>
