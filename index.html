<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva Dreams v06 - Firebase</title>
    <style>
        :root {
            --primary: #00ff00; 
            --bg: #000000;      
            --text-user: #00ff00;
            --bot-bg: rgba(0, 255, 0, 0.1); 
            --bot-text: #c0ffc0;
            --header-bg: #0a0a0a;
            --panel-bg: #111111;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; padding: 10px; color: #fff; }

        .chat-container {
            width: 100%; max-width: 450px; background: #050505; border-radius: 12px;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2); display: flex; flex-direction: column;
            height: 90vh; max-height: 750px; overflow: hidden; border: 1px solid rgba(0, 255, 0, 0.1);
        }

        .chat-header {
            background: var(--header-bg); color: var(--primary); padding: 15px; text-align: center;
            font-weight: bold; font-size: 1.1rem; letter-spacing: 2px; text-transform: uppercase;
            border-bottom: 1px solid rgba(0, 255, 0, 0.2); display: flex; height: 60px; justify-content: center; align-items: center; gap: 8px;
        }

        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; background: #000; }

        .msg { padding: 12px 16px; border-radius: 15px; max-width: 85%; line-height: 1.4; font-size: 0.95rem; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg.bot { background: var(--bot-bg); color: var(--bot-text); align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid rgba(0,255,0,0.1); }
        .msg.user { background: #111; color: var(--text-user); align-self: flex-end; border-bottom-right-radius: 2px; border: 1px solid var(--primary); }

        .ui-box { margin-top: 5px; display: flex; flex-direction: column; gap: 10px; width: 100%; }
        .ui-box input { padding: 12px; border: 1px solid #333; border-radius: 8px; font-size: 1rem; width: 100%; outline: none; background: #111; color: #fff; }
        .ui-box input:focus { border-color: var(--primary); }
        
        .btn-action { padding: 12px; background: var(--primary); color: #000; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; }
        .btn-action:hover { box-shadow: 0 0 10px var(--primary); }
        
        .card-motel { background: #111; border: 1px solid #333; border-radius: 8px; overflow: hidden; cursor: pointer; transition: 0.2s; margin-bottom: 5px; }
        .card-motel:hover { border-color: var(--primary); }
        .card-motel img { width: 100%; height: 120px; object-fit: cover; }
        .card-motel div { padding: 12px; text-align: center; font-weight: bold; color: var(--primary); }

        .input-area { display: flex; padding: 15px; border-top: 1px solid rgba(0,255,0,0.1); gap: 10px; background: #0a0a0a; }
        .input-area input { flex: 1; padding: 12px; border: 1px solid #333; border-radius: 20px; outline: none; background: #1a1a1a; color: #fff; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header"><span>♾️</span> DREAMS MOTEL</div>
        <div class="chat-box" id="chat"></div>
        <div class="input-area" id="inputArea">
            <input type="text" id="userInput" placeholder="Digite seu nome..." onkeypress="window.handleEnter(event, 'nome')">
            <button onclick="window.handleText()">Enviar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCln4mcb1j46UcmG-sTVb3bUudTQCpdfvY",
            authDomain: "moteisfortaleza-9dadd.firebaseapp.com",
            projectId: "moteisfortaleza-9dadd",
            storageBucket: "moteisfortaleza-9dadd.firebasestorage.app",
            messagingSenderId: "285292896374",
            appId: "1:285292896374:web:ef6d3ad37e94313ad3bf57"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const chat = document.getElementById('chat');
        const inputArea = document.getElementById('inputArea');
        const userInput = document.getElementById('userInput');

        let step = 0;
        let userData = { nome: '', email: '', telefone: '', dataNasc: '', cpf: '', suite: '', precoBase: 0, dataRes: '', horaRes: '', total: 0 };

        const suites = [
            { nome: "Suíte Standard", preco: 100, img: "https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?w=400&h=200&fit=crop" },
            { nome: "Suíte Master", preco: 180, img: "https://images.unsplash.com/photo-1542314831-c6a4d27ece08?w=400&h=200&fit=crop" },
            { nome: "Suíte Dreams (Hidro)", preco: 250, img: "https://images.unsplash.com/photo-1566665797739-1674de7a421a?w=400&h=200&fit=crop" }
        ];

        function addMsg(text, sender) {
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            div.innerHTML = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        window.handleEnter = function(event, type) {
            if (event.key === 'Enter') {
                if (type === 'nome') window.handleText();
                else window.processarUI(type);
            }
        }

        function toggleUI(show) { inputArea.style.display = show ? 'flex' : 'none'; }
        function removerUIAnterior() { const uis = document.querySelectorAll('.ui-box'); uis.forEach(u => u.style.display = 'none'); }

        // Pega a data atual convertida para o fuso horário local para usar no "min" do input date
        const local = new Date();
        local.setMinutes(local.getMinutes() - local.getTimezoneOffset());
        const hojeLocal = local.toISOString().split('T')[0];

        function renderUI(type) {
            toggleUI(false);
            const div = document.createElement('div');
            div.className = 'ui-box msg bot';

            if (type === 'email') {
                div.innerHTML = `<label>E-mail:</label>
                <input type="email" id="uiEmail" placeholder="seu@email.com" onkeypress="window.handleEnter(event, 'email')">
                <button class="btn-action" onclick="window.processarUI('email')">Confirmar</button>`;
            }
            else if (type === 'telefone') {
                div.innerHTML = `<label>WhatsApp / Telefone:</label>
                <input type="tel" id="uiTelefone" placeholder="(00) 00000-0000" maxlength="15" oninput="window.mascaraTelefone(this)" onkeypress="window.handleEnter(event, 'telefone')">
                <button class="btn-action" onclick="window.processarUI('telefone')">Confirmar</button>`;
            }
            else if (type === 'dataNasc') {
                div.innerHTML = `<label>Data de nascimento:</label>
                <input type="date" id="uiData" onkeypress="window.handleEnter(event, 'dataNasc')">
                <button class="btn-action" onclick="window.processarUI('dataNasc')">Confirmar</button>`;
            } 
            else if (type === 'cpf') {
                div.innerHTML = `<label>CPF (Apenas números):</label>
                <input type="text" id="uiCpf" placeholder="000.000.000-00" maxlength="14" oninput="window.mascaraCPF(this)" onkeypress="window.handleEnter(event, 'cpf')">
                <button class="btn-action" onclick="window.processarUI('cpf')">Confirmar CPF</button>`;
            }
            else if (type === 'suite') {
                div.style.background = 'transparent'; div.style.border = 'none';
                suites.forEach(s => {
                    div.innerHTML += `<div class="card-motel" onclick="window.processarUI('suite', '${s.nome}', ${s.preco})"><img src="${s.img}"><div>${s.nome}</div></div>`;
                });
            } 
            else if (type === 'dataRes') {
                div.innerHTML = `<label>Data da reserva:</label>
                <input type="date" id="uiDataRes" min="${hojeLocal}" onkeypress="window.handleEnter(event, 'dataRes')">
                <button class="btn-action" onclick="window.processarUI('dataRes')">Confirmar Data</button>`;
            } 
            else if (type === 'horaRes') {
                div.innerHTML = `<label>Horário de chegada:</label>
                <input type="time" id="uiHoraRes" onkeypress="window.handleEnter(event, 'horaRes')">
                <button class="btn-action" onclick="window.processarUI('horaRes')">Confirmar Horário</button>`;
            }
            else if (type === 'finalizar') {
                div.innerHTML = `<button class="btn-action" onclick="window.finalizarFluxo()">Confirmar Pré-Reserva</button>`;
            }

            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            const input = div.querySelector('input');
            if(input) input.focus();
        }

        window.handleText = function() { 
            const text = userInput.value.trim(); 
            if (!text) return; 
            addMsg(text, 'user'); 
            userInput.value = ''; 
            if (step === 0) { userData.nome = text; step++; setTimeout(nextStep, 500); } 
        }

        window.mascaraCPF = function(i){
            i.value = i.value.replace(/\D/g,"");
            i.value = i.value.replace(/(\d{3})(\d)/,"$1.$2");
            i.value = i.value.replace(/(\d{3})(\d)/,"$1.$2");
            i.value = i.value.replace(/(\d{3})(\d{1,2})$/,"$1-$2");
        }

        window.mascaraTelefone = function(i) {
            i.value = i.value.replace(/\D/g,"");
            i.value = i.value.replace(/^(\d{2})(\d)/g,"($1) $2");
            i.value = i.value.replace(/(\d)(\d{4})$/,"$1-$2");
        }

        window.processarUI = function(tipo, valor = null, precoBase = null) {
            if (tipo === 'email') { 
                const email = document.getElementById('uiEmail').value; 
                if(!email.includes('@')) { alert("Digite um e-mail válido."); return; }
                addMsg(email, 'user'); userData.email = email; step++; 
            }
            else if (tipo === 'telefone') { 
                const tel = document.getElementById('uiTelefone').value; 
                if(tel.length < 14) { alert("Digite o telefone completo."); return; }
                addMsg(tel, 'user'); userData.telefone = tel; step++; 
            }
            else if (tipo === 'dataNasc') { 
                const data = document.getElementById('uiData').value; 
                if(!data) return;
                addMsg(data.split('-').reverse().join('/'), 'user'); userData.dataNasc = data; step++; 
            } 
            else if (tipo === 'cpf') { 
                const cpf = document.getElementById('uiCpf').value; 
                if(cpf.length < 14) return;
                addMsg(cpf, 'user'); userData.cpf = cpf; step++; 
            }
            else if (tipo === 'suite') { 
                addMsg(valor, 'user'); userData.suite = valor; userData.precoBase = precoBase; step++; 
            } 
            else if (tipo === 'dataRes') { 
                const data = document.getElementById('uiDataRes').value; 
                if(!data) return;
                addMsg(data.split('-').reverse().join('/'), 'user'); userData.dataRes = data; step++; 
            } 
            else if (tipo === 'horaRes') { 
                const hora = document.getElementById('uiHoraRes').value; 
                if(!hora) return;

                // LÓGICA DE BLOQUEIO DE HORÁRIO PASSADO
                const agora = new Date();
                const dataEscolhida = new Date(`${userData.dataRes}T${hora}:00`);
                if (dataEscolhida < agora) {
                    alert("⚠️ Horário inválido. Escolha um horário futuro.");
                    return;
                }

                addMsg(hora, 'user'); userData.horaRes = hora; step++; 
            }
            
            removerUIAnterior(); setTimeout(nextStep, 500);
        }

        function nextStep() {
            switch(step) {
                case 0: addMsg("Olá! Bem-vindo ao <b>Motel Dreams</b>. Como você se chama?", 'bot'); toggleUI(true); userInput.focus(); break;
                case 1: addMsg(`Prazer, ${userData.nome}. Qual o seu melhor e-mail?`, 'bot'); renderUI('email'); break;
                case 2: addMsg("E o seu WhatsApp?", 'bot'); renderUI('telefone'); break;
                case 3: addMsg("Selecione sua data de nascimento:", 'bot'); renderUI('dataNasc'); break;
                case 4: addMsg("Informe seu CPF para o agendamento:", 'bot'); renderUI('cpf'); break;
                case 5: addMsg("Qual suíte deseja?", 'bot'); renderUI('suite'); break;
                case 6: addMsg("Para qual data deseja agendar?", 'bot'); renderUI('dataRes'); break;
                case 7: addMsg("Qual o horário previsto de chegada?", 'bot'); renderUI('horaRes'); break;
                case 8: 
                    addMsg(`<b>Resumo:</b><br>Suíte: ${userData.suite}<br>Data: ${userData.dataRes.split('-').reverse().join('/')}<br>Hora: ${userData.horaRes}`, 'bot');
                    renderUI('finalizar');
                    break;
            }
        }

        // Envio real para o Firebase (agora com Email e Telefone)
        window.finalizarFluxo = async function() {
            removerUIAnterior();
            addMsg("⏳ Registrando sua pré-reserva no sistema...", 'bot');

            try {
                const docRef = await addDoc(collection(db, "reservas"), {
                    cliente_nome: userData.nome,
                    cliente_email: userData.email,
                    cliente_telefone: userData.telefone,
                    cliente_cpf: userData.cpf,
                    cliente_nascimento: userData.dataNasc,
                    suite: userData.suite,
                    data_reserva: userData.dataRes,
                    hora_chegada: userData.horaRes,
                    status: 'pendente_recepcao',
                    criado_em: new Date().toISOString()
                });

                addMsg("✅ <b>Pré-Reserva Confirmada!</b><br>Apresente seu CPF na recepção ao chegar.", 'bot');
            } catch (error) {
                console.error("Erro no Firebase:", error);
                addMsg("❌ Tivemos um problema de conexão. Por favor, mostre esta tela na recepção.", 'bot');
            }
        }

        window.onload = nextStep;
    </script>
</body>
</html>
