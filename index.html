<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot com Integração Sismotel</title>
    <style>
        :root { --primary: #c0392b; --bg: #f4f7f6; --bot-bg: #ecf0f1; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; padding: 10px; }
        
        .chat-container { width: 100%; max-width: 450px; background: #fff; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); display: flex; flex-direction: column; height: 90vh; max-height: 750px; overflow: hidden; }
        .chat-header { background: #2c3e50; color: #fff; padding: 15px; text-align: center; font-weight: bold; font-size: 1.1rem; }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        
        .msg { padding: 12px 16px; border-radius: 15px; max-width: 85%; line-height: 1.4; font-size: 0.95rem; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .msg.bot { background: var(--bot-bg); color: #333; align-self: flex-start; border-bottom-left-radius: 2px; }
        .msg.user { background: var(--primary); color: #fff; align-self: flex-end; border-bottom-right-radius: 2px; }
        
        .ui-box { margin-top: 5px; display: flex; flex-direction: column; gap: 10px; width: 100%; }
        .ui-box input { padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; width: 100%; outline: none; }
        .ui-box button.btn-action { padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        .ui-box button.btn-outline { padding: 12px; background: transparent; color: var(--primary); border: 2px solid var(--primary); border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
        
        .card-motel { background: #fff; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; cursor: pointer; transition: 0.2s; }
        .card-motel:hover { border-color: var(--primary); box-shadow: 0 0 10px rgba(192,57,43,0.2); }
        .card-motel img { width: 100%; height: 100px; object-fit: cover; }
        .card-motel div { padding: 10px; text-align: center; font-weight: bold; color: #333; }

        .upsell-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; margin-bottom: 5px; }
        .upsell-item.active { border-color: var(--primary); background: #fdf2f2; }

        .input-area { display: flex; padding: 15px; border-top: 1px solid #eee; gap: 10px; background: #fff; }
        .input-area input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 20px; outline: none; }
        .input-area button { background: var(--primary); color: #fff; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }

        .pix-box { background: #f4f4f9; border: 1px dashed #333; padding: 10px; text-align: center; border-radius: 5px; font-family: monospace; word-break: break-all; margin: 10px 0; font-size: 0.85rem; cursor: pointer; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">Autoatendimento - Motéis Fortaleza</div>
        <div class="chat-box" id="chat"></div>
        <div class="input-area" id="inputArea">
            <input type="text" id="userInput" placeholder="Digite aqui..." onkeypress="if(event.key === 'Enter') handleText()">
            <button onclick="handleText()">Enviar</button>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const inputArea = document.getElementById('inputArea');
        const userInput = document.getElementById('userInput');

        let step = 0;
        let userData = { nome: '', dataNasc: '', motel: '', dataRes: '', horaRes: '', upsells: [], total: 150, formaPagamento: '' };

        const moteis = [
            { nome: "Dragon Motel", img: "https://images.unsplash.com/photo-1578683010236-d716f9a3f461?w=300&h=150&fit=crop" },
            { nome: "Assahi Motel", img: "https://images.unsplash.com/photo-1582719478250-c89cae4dc85b?w=300&h=150&fit=crop" },
            { nome: "Dreams Motel", img: "https://images.unsplash.com/photo-1542314831-c6a4d27ece08?w=300&h=150&fit=crop" },
            { nome: "Spa Urbano", img: "https://images.unsplash.com/photo-1566665797739-1674de7a421a?w=300&h=150&fit=crop" }
        ];

        function addMsg(text, sender) {
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            div.innerHTML = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function toggleUI(show) { inputArea.style.display = show ? 'flex' : 'none'; }
        function removerUIAnterior() { const uis = document.querySelectorAll('.ui-box'); if(uis.length) uis[uis.length - 1].style.display = 'none'; }

        function renderUI(type) {
            toggleUI(false);
            const div = document.createElement('div');
            div.className = 'ui-box msg bot';

            if (type === 'dataNasc') {
                div.innerHTML = `<label>Data de nascimento:</label><input type="date" id="uiData"><button class="btn-action" onclick="processarUI('dataNasc')">Confirmar</button>`;
            } else if (type === 'motel') {
                div.style.background = 'transparent'; div.style.padding = '0';
                moteis.forEach(m => {
                    div.innerHTML += `<div class="card-motel" onclick="processarUI('motel', '${m.nome}')"><img src="${m.img}"><div>${m.nome} (R$ 150)</div></div>`;
                });
            } else if (type === 'dataRes') {
                const hoje = new Date().toISOString().split('T')[0];
                div.innerHTML = `<label>Data da reserva:</label><input type="date" id="uiDataRes" min="${hoje}"><button class="btn-action" onclick="processarUI('dataRes')">Confirmar Data</button>`;
            } else if (type === 'horaRes') {
                div.innerHTML = `<label>Horário de chegada:</label><input type="time" id="uiHoraRes"><button class="btn-action" onclick="processarUI('horaRes')">Confirmar Horário</button>`;
            } else if (type === 'upsell') {
                div.innerHTML = `
                    <p style="font-weight:bold;">Torne o momento especial:</p>
                    <div class="upsell-item" onclick="this.classList.toggle('active')" data-val="100" data-nome="🍾 Espumante"><span>🍾 Espumante</span><span>+ R$ 100</span></div>
                    <div class="upsell-item" onclick="this.classList.toggle('active')" data-val="50" data-nome="🌹 Pétalas"><span>🌹 Pétalas</span><span>+ R$ 50</span></div>
                    <button class="btn-action" onclick="processarUpsell(this.parentNode)">Avançar</button>
                `;
            } else if (type === 'pagamento') {
                div.innerHTML = `
                    <p style="font-weight:bold;">Como deseja proceder?</p>
                    <button class="btn-action" onclick="processarPagamento('pix_agora')">Pagar agora via Pix (Garante a vaga)</button>
                    <button class="btn-outline" onclick="processarPagamento('recepcao')">Pagar na Recepção (Sujeito à fila)</button>
                `;
            }
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function handleText() {
            const text = userInput.value.trim();
            if (!text) return;
            addMsg(text, 'user');
            userInput.value = '';
            if (step === 0) { userData.nome = text; step++; setTimeout(nextStep, 500); }
        }

        function calcularIdade(d) {
            const hoje = new Date(); const nasc = new Date(d);
            let idade = hoje.getFullYear() - nasc.getFullYear();
            if (hoje.getMonth() < nasc.getMonth() || (hoje.getMonth() === nasc.getMonth() && hoje.getDate() < nasc.getDate())) idade--;
            return idade;
        }

        function processarUI(tipo, valor = null) {
            if (tipo === 'dataNasc') {
                const data = document.getElementById('uiData').value;
                if(!data) return; addMsg(data.split('-').reverse().join('/'), 'user');
                if (calcularIdade(data) < 18) { addMsg("Apenas maiores de 18 anos.", 'bot'); return; }
                userData.dataNasc = data; step++;
            } else if (tipo === 'motel') {
                addMsg(valor, 'user'); userData.motel = valor; step++;
            } else if (tipo === 'dataRes') {
                const data = document.getElementById('uiDataRes').value;
                if(!data) return; addMsg(data.split('-').reverse().join('/'), 'user'); userData.dataRes = data; step++;
            } else if (tipo === 'horaRes') {
                const hora = document.getElementById('uiHoraRes').value;
                if(!hora) return; addMsg(hora, 'user'); userData.horaRes = hora; step++;
            }
            removerUIAnterior();
            setTimeout(nextStep, 500);
        }

        function processarUpsell(container) {
            const ativos = container.querySelectorAll('.upsell-item.active');
            let txt = [];
            ativos.forEach(el => {
                userData.total += parseInt(el.getAttribute('data-val'));
                userData.upsells.push(el.getAttribute('data-nome'));
                txt.push(el.getAttribute('data-nome'));
            });
            addMsg(txt.length ? txt.join(' e ') : "Nenhum adicional", 'user');
            removerUIAnterior();
            step++;
            setTimeout(nextStep, 500);
        }

        function processarPagamento(escolha) {
            userData.formaPagamento = escolha;
            addMsg(escolha === 'pix_agora' ? "Pagar agora via Pix" : "Pagar na Recepção", 'user');
            removerUIAnterior();
            step++;
            setTimeout(nextStep, 500);
        }

        // ==========================================
        // INTEGRAÇÃO SISMOTEL (Simulação do Backend)
        // ==========================================
        function enviarParaSismotel(statusReserva) {
            console.log("Enviando JSON para a API do Sismotel...");
            const payload = {
                cliente_nome: userData.nome,
                cliente_nascimento: userData.dataNasc,
                motel: userData.motel,
                data_reserva: userData.dataRes,
                hora_chegada: userData.horaRes,
                valor_total: userData.total,
                adicionais: userData.upsells,
                status: statusReserva // 'confirmado' ou 'pendente_recepcao'
            };
            console.log(JSON.stringify(payload, null, 2));
            // Aqui entrará o fetch() real para o seu servidor Node.js que conecta no Sismotel
        }

        function nextStep() {
            switch(step) {
                case 0: addMsg("Olá! Sou o assistente de reservas. Como você se chama?", 'bot'); toggleUI(true); break;
                case 1: addMsg(`Prazer, ${userData.nome}. Precisamos validar sua idade:`, 'bot'); renderUI('dataNasc'); break;
                case 2: addMsg("Perfeito. Escolha o motel desejado:", 'bot'); renderUI('motel'); break;
                case 3: addMsg("Para qual data será o agendamento?", 'bot'); renderUI('dataRes'); break;
                case 4: addMsg("Qual o horário previsto de chegada?", 'bot'); renderUI('horaRes'); break;
                case 5: addMsg("Deseja adicionar algo especial na suíte?", 'bot'); renderUI('upsell'); break;
                case 6: 
                    addMsg(`Seu total deu <b>R$ ${userData.total},00</b>.`, 'bot');
                    renderUI('pagamento'); 
                    break;
                case 7: 
                    finalizarFluxo(); 
                    break;
            }
        }

        function finalizarFluxo() {
            if (userData.formaPagamento === 'recepcao') {
                // Envia pro Sismotel como pendente
                enviarParaSismotel('pendente_recepcao');
                addMsg(`✅ Tudo certo! Seu pré-agendamento foi enviado diretamente para a recepção do <b>${userData.motel}</b>. Te aguardamos lá!`, 'bot');
            } else {
                // Envia pro Sismotel como aguardando pix (ou envia só depois que pagar)
                enviarParaSismotel('aguardando_pix');
                const msgPix = `
                    Excelente. Sua vaga está sendo segurada no sistema.<br>
                    Copie o código abaixo e pague no seu app do banco.<br>
                    <div class="pix-box" onclick="alert('Código Copiado!')">00020126360014BR.GOV.BCB.PIX...</div>
                    <button class="btn-action" onclick="confirmarPix()">Já realizei o pagamento</button>
                `;
                addMsg(msgPix, 'bot');
            }
        }

        function confirmarPix() {
            removerUIAnterior(); // Remove o botão de pagar
            addMsg("Já realizei o pagamento", 'user');
            
            setTimeout(() => {
                // Aqui o backend validaria se caiu o Pix mesmo.
                // Atualiza o Sismotel informando que está pago.
                enviarParaSismotel('confirmado_pago');
                addMsg(`✅ Pix confirmado! Sua reserva no <b>${userData.motel}</b> está 100% garantida.`, 'bot');
            }, 1000);
        }

        window.onload = nextStep;
    </script>
</body>
</html>
