<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Recepção - Dreams</title>
    
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    
    <style>
        :root {
            --primary: #00ff00; 
            --bg: #050505;      
            --header-bg: #0a0a0a;
            --panel-bg: #111111;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: var(--bg); color: #fff; padding: 20px; }

        header {
            background: var(--header-bg); border-bottom: 1px solid rgba(0, 255, 0, 0.2);
            padding: 20px; text-align: center; margin-bottom: 30px; border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.1);
        }
        
        h1 { color: var(--primary); font-size: 1.5rem; letter-spacing: 2px; text-transform: uppercase; }
        span.subtitle { font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }

        .container { max-width: 1200px; margin: 0 auto; }

        /* Customização do Calendário para o Tema Escuro */
        #calendar { background: var(--panel-bg); padding: 20px; border-radius: 12px; border: 1px solid rgba(0, 255, 0, 0.2); }
        .fc-theme-standard td, .fc-theme-standard th { border-color: #333 !important; }
        .fc-col-header-cell-cushion, .fc-daygrid-day-number, .fc-timegrid-axis-cushion, .fc-timegrid-slot-label-cushion { color: #fff !important; }
        
        /* Botões do Calendário */
        .fc .fc-button-primary { background-color: #000 !important; border-color: var(--primary) !important; color: var(--primary) !important; font-weight: bold; text-transform: uppercase; }
        .fc .fc-button-primary:hover { background-color: rgba(0, 255, 0, 0.1) !important; }
        .fc .fc-button-primary:not(:disabled).fc-button-active { background-color: var(--primary) !important; color: #000 !important; }

        /* Eventos (Reservas) */
        .fc-event {
            background-color: var(--primary) !important; 
            color: #000 !important; 
            border: none !important; 
            padding: 3px 6px; 
            font-weight: bold; 
            cursor: pointer;
            border-radius: 4px;
            transition: 0.2s;
        }
        .fc-event:hover { box-shadow: 0 0 10px var(--primary); transform: scale(1.02); }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1><span>♾️</span> DREAMS MOTEL</h1>
            <span class="subtitle">Painel de Recepção - Controle de Agendamentos</span>
        </header>

        <div id='calendar'></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

        // Configuração Firebase (A mesma do Bot)
        const firebaseConfig = {
            apiKey: "AIzaSyCln4mcb1j46UcmG-sTVb3bUudTQCpdfvY",
            authDomain: "moteisfortaleza-9dadd.firebaseapp.com",
            projectId: "moteisfortaleza-9dadd",
            storageBucket: "moteisfortaleza-9dadd.firebasestorage.app",
            messagingSenderId: "285292896374",
            appId: "1:285292896374:web:ef6d3ad37e94313ad3bf57"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Função para buscar as reservas e formatar para o FullCalendar
        async function carregarReservas() {
            const querySnapshot = await getDocs(collection(db, "reservas"));
            const eventos = [];

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                
                // Monta a string de Data e Hora no padrão ISO 8601 (Ex: 2026-04-21T15:30:00)
                const dataHoraIso = `${data.data_reserva}T${data.hora_chegada}:00`;

                eventos.push({
                    id: doc.id,
                    title: `${data.cliente_nome} - ${data.suite}`,
                    start: dataHoraIso,
                    extendedProps: {
                        cpf: data.cliente_cpf,
                        status: data.status,
                        criado_em: data.criado_em
                    }
                });
            });

            return eventos;
        }

        // Inicializar o FullCalendar após o HTML carregar
        document.addEventListener('DOMContentLoaded', async function() {
            var calendarEl = document.getElementById('calendar');
            
            // Aqui buscamos os dados no Firebase antes de renderizar
            const eventosFirebase = await carregarReservas();

            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'timeGridDay', // Visão diária ideal para a recepção
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek,timeGridDay'
                },
                locale: 'pt-br',
                buttonText: {
                    today: 'Hoje',
                    month: 'Mês',
                    week: 'Semana',
                    day: 'Dia'
                },
                slotMinTime: '06:00:00', // Começa a mostrar às 6h da manhã
                slotLabelFormat: {
                    hour: '2-digit',
                    minute: '2-digit',
                    omitZeroMinute: false,
                    meridiem: false
                },
                events: eventosFirebase, // Passa as reservas do Firebase para o calendário
                eventClick: function(info) {
                    // Quando clicar na reserva, mostra os detalhes
                    const props = info.event.extendedProps;
                    
                    let mensagem = `📋 DETALHES DA RESERVA\n\n`;
                    mensagem += `Cliente: ${info.event.title.split(' - ')[0]}\n`;
                    mensagem += `CPF: ${props.cpf}\n`;
                    mensagem += `Suíte: ${info.event.title.split(' - ')[1]}\n`;
                    mensagem += `Chegada: ${info.event.start.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'})}\n`;
                    mensagem += `Status: ${props.status}\n`;
                    
                    alert(mensagem);
                }
            });

            calendar.render();
        });
    </script>
</body>
</html>
